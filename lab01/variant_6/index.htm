<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форма підписки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="form-block">
            <h1>Підпишіться на новини</h1>
            <p>Будьте в курсі всіх подій нашого курсу.</p>
            <input type="email" placeholder="Введіть ваш Email" id="email-input">
            <button id="send-btn">Надіслати</button>
        </div>

        <div id="success-block" class="hidden">
            <div class="icon">✅</div>
            <h1>Дякуємо!</h1>
            <p>Ви успішно підписалися на оновлення.</p>
            <button id="back-btn">Назад</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
